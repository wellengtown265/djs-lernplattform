[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "app/netlify/functions"

[[redirects]]
  from = "/api/notes"
  to = "/.netlify/functions/notes"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/bildertest/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/geo/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
